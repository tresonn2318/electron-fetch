<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>electron-fetch example</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Iosevka Aile",
          "IBM Plex Sans",
          ui-sans-serif,
          sans-serif;
        background:
          radial-gradient(circle at top left, #ffd7a8, transparent 30%),
          radial-gradient(circle at top right, #bce3ff, transparent 35%),
          linear-gradient(180deg, #fffdf9 0%, #f3f7fb 100%);
        color: #183042;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px;
        border: 1px solid rgba(24, 48, 66, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(24, 48, 66, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #496579;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #0f766e, #2563eb);
        cursor: pointer;
      }

      button.secondary {
        color: #183042;
        background: rgba(24, 48, 66, 0.08);
      }

      .grid {
        margin-top: 24px;
        display: grid;
        gap: 16px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(24, 48, 66, 0.1);
        background: rgba(255, 255, 255, 0.7);
      }

      .label {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6a8192;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family:
          "Iosevka",
          "SFMono-Regular",
          ui-monospace,
          monospace;
      }

      .status-ok {
        color: #0f766e;
      }

      .status-error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>electron-fetch</h1>
      <p>
        This example fetches from a local HTTP server through the preload
        helper and prints the results below.
      </p>

      <div class="actions">
        <button id="run-tests" type="button">Run Bridge Test</button>
        <button id="clear" class="secondary" type="button">Clear Output</button>
      </div>

      <div class="grid">
        <section class="card">
          <span class="label">Summary</span>
          <pre id="summary">Waiting to run…</pre>
        </section>
        <section class="card">
          <span class="label">Details</span>
          <pre id="details">No requests made yet.</pre>
        </section>
      </div>
    </main>

    <script type="module" src="./dist/renderer.js"></script>
  </body>
</html>
